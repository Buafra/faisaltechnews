<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:'Cairo',Tahoma,Arial,sans-serif;min-height:100vh;padding:20px 16px 120px;}
h1{text-align:center;font-size:24px;font-weight:900;color:#fff;margin-bottom:4px;background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{text-align:center;font-size:13px;color:#888;margin-bottom:24px;letter-spacing:0.5px;}
.update-time{text-align:center;font-size:12px;color:#666;margin-bottom:16px;padding:8px;background:rgba(139,92,246,0.1);border-radius:8px;}
.refresh-btn{display:block;margin:0 auto 20px;padding:10px 20px;background:linear-gradient(135deg,#8B5CF6,#EC4899);border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:700;transition:all .3s;}
.refresh-btn:hover{transform:scale(1.05);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1200px;margin:0 auto;}
.card{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);border:2px solid rgba(139,92,246,0.2);border-radius:16px;padding:18px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;user-select:none;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(236,72,153,0.05));opacity:0;transition:opacity .25s;}
.card:hover{border-color:#8B5CF6;transform:translateY(-4px);box-shadow:0 8px 24px rgba(139,92,246,0.15);}
.card:hover::before{opacity:1;}
.card.generating{border-color:#EC4899;animation:pulse 0.6s;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,0.7);}50%{box-shadow:0 0 0 15px rgba(236,72,153,0);}}
.card-tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:0.5px;}
.tag-hot{background:rgba(236,72,153,0.2);color:#EC4899;}
.tag-new{background:rgba(139,92,246,0.2);color:#8B5CF6;}
.tag-safe{background:rgba(16,185,129,0.2);color:#10B981;}
.card-emoji{font-size:32px;margin-bottom:8px;display:block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.card-title{font-size:16px;font-weight:900;color:#fff;margin-bottom:8px;line-height:1.4;position:relative;z-index:1;}
.card-desc{font-size:13px;color:#aaa;line-height:1.8;position:relative;z-index:1;}
.date-badge{position:absolute;top:14px;left:14px;font-size:10px;color:#666;font-weight:700;direction:ltr;background:rgba(0,0,0,0.3);padding:3px 8px;border-radius:6px;}
.carousel-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto;}
.carousel-modal.show{display:flex;}
.carousel-container{background:#0a0a0a;border-radius:20px;max-width:1200px;width:100%;overflow:hidden;}
.carousel-header{background:linear-gradient(135deg,#8B5CF6,#EC4899);padding:20px;display:flex;justify-content:space-between;align-items:center;}
.carousel-header h2{color:#fff;font-size:24px;}
.close-btn{background:#fff;color:#000;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer;font-weight:bold;transition:all .3s;}
.close-btn:hover{transform:scale(1.1);background:#EC4899;color:#fff;}
.carousel-wrapper{
    background:#000;
    padding:10px;
    height:500px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
}.slide{width:1080px;height:1350px;background:#000000;border-radius:32px;display:none;flex-direction:column;overflow:hidden;position:relative;margin:0 auto;}
.slide.active{display:flex;}
.slide-preview{
    transform:scale(0.15);
    transform-origin:top center;
}
.progress{display:flex;gap:8px;padding:40px 60px 0;}
.progress span{height:8px;border-radius:4px;flex:1;}
.p-done{background:#333;}
.p-active{background:linear-gradient(90deg,#8B5CF6,#EC4899);}
.p-next{background:#222;}
.slide-num{color:#666;font-size:32px;font-weight:700;padding:10px 60px 0;text-align:left;direction:ltr;}
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;text-align:center;}
.grad{background:linear-gradient(90deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;padding-bottom:12px;display:inline-block;line-height:1.3;}
.main-text{color:#fff;font-weight:700;line-height:1.4;}
.sub-text{color:#bbb;line-height:1.6;}
.cta-btn{background:#8B5CF633;border:4px solid #8B5CF6;border-radius:60px;padding:24px 80px;color:#fff;font-size:36px;font-weight:700;margin-top:40px;display:inline-block;}
.carousel-controls{display:flex;gap:20px;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 100%);flex-wrap:wrap;}
.carousel-controls button{background:#333;border:none;color:#fff;font-size:32px;width:72px;height:72px;border-radius:50%;cursor:pointer;transition:all .3s;}
.carousel-controls button:hover{background:#8B5CF6;transform:scale(1.1);}
.download-btn{background:linear-gradient(90deg,#8B5CF6,#EC4899);border:none;border-radius:20px;padding:16px 40px;color:#fff;font-size:24px;font-weight:700;cursor:pointer;transition:all .3s;}
.download-btn:hover{transform:scale(1.05);}
.no-news{text-align:center;padding:40px;color:#888;font-size:18px;}
.loading{text-align:center;padding:40px;color:#8B5CF6;font-size:18px;}
</style>
</head>
<body>
<h1>🗞️ منصة أخبار التقنية الحية</h1>
<p class="sub">أخبار تحدّث تلقائياً من البوت الذكي</p>
<p class="update-time">آخر تحديث: <span id="lastUpdate">جاري التحميل...</span></p>
<button class="refresh-btn" onclick="loadNews()">🔄 تحديث الآن</button>

<div class="grid" id="newsGrid">
  <div class="loading">⏳ جاري تحميل الأخبار...</div>
</div>

<!-- Carousel Modal -->
<div class="carousel-modal" id="carouselModal">
  <div class="carousel-container">
    <div class="carousel-header">
      <h2 id="carouselTitle">الكاروسيل</h2>
      <button class="close-btn" onclick="closeCarousel()">✕</button>
    </div>
    <div class="carousel-wrapper" id="carouselWrapper">
      <!-- Slides will be generated here -->
    </div>
    <div class="carousel-controls">
      <button onclick="goSlide(-1)">‹</button>
      <span id="slideInfo">1 / 6</span>
      <button onclick="goSlide(1)">›</button>
      <button class="download-btn" onclick="downloadCurrent()">📥 حمّل PNG</button>
      <button class="download-btn" onclick="downloadAll()">⬇️ حمّل الكل</button>
    </div>
  </div>
</div>

<script>
let newsData = [];
let currentSlide = 1;
let totalSlides = 6;

// تحميل الأخبار من ملف JSON
async function loadNews() {
  try {
    // جرّب تحميل من مسار مختلف
    const paths = [
      'news_data.json',
      '../news_data.json',
      '../../news_data.json',
      '/news_data.json'
    ];
    
    let response = null;
    for (let path of paths) {
      try {
        response = await fetch(path);
        if (response.ok) break;
      } catch(e) {}
    }
    
    if (!response || !response.ok) {
      throw new Error('Could not find news_data.json');
    }
    
    newsData = await response.json();
    
    // تحديث آخر وقت تحديث
    const now = new Date();
    document.getElementById('lastUpdate').textContent = now.toLocaleString('ar-SA');
    
    renderNews();
  } catch (error) {
    console.error('Error loading news:', error);
    document.getElementById('newsGrid').innerHTML = `
      <div class="no-news">
        ⚠️ لم يتم العثور على الأخبار<br>
        <small>تأكد من وجود ملف news_data.json في نفس المجلد</small>
      </div>
    `;
  }
}

function renderNews() {
  const grid = document.getElementById('newsGrid');
  
  if (newsData.length === 0) {
    grid.innerHTML = '<div class="no-news">📭 لا توجد أخبار حالياً</div>';
    return;
  }
  
  grid.innerHTML = '';
  
  newsData.forEach((news, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('ondblclick', `generateCarousel(${index})`);
    
    const tagClass = news.tag === 'hot' ? 'tag-hot' : news.tag === 'new' ? 'tag-new' : 'tag-safe';
    const tagEmoji = news.tag === 'hot' ? '🔥' : news.tag === 'new' ? '✨' : '🛡️';
    
    card.innerHTML = `
      <div class="date-badge">${news.date}</div>
      <span class="card-tag ${tagClass}">${tagEmoji} ${news.tag}</span>
      <span class="card-emoji">${news.emoji || '📰'}</span>
      <div class="card-title">${news.title}</div>
      <div class="card-desc">${news.description}</div>
    `;
    
    grid.appendChild(card);
  });
}

function generateCarousel(newsIndex) {
  const news = newsData[newsIndex];
  if (!news) return;
  
  const card = event.target.closest('.card');
  if (card) card.classList.add('generating');
  
  createCarouselSlides(news);
  document.getElementById('carouselModal').classList.add('show');
  document.getElementById('carouselTitle').textContent = '🎨 ' + news.title.substring(0, 30) + '...';
  
  currentSlide = 1;
  updateSlide();
  
  setTimeout(() => {
    if (card) card.classList.remove('generating');
  }, 500);
}

function createCarouselSlides(news) {
  const wrapper = document.getElementById('carouselWrapper');
  wrapper.innerHTML = '';
  
  const slides = [
    {
      content: `
        <div class="progress">
          <span class="p-active"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
        </div>
        <div class="slide-num">1/6</div>
        <div class="content">
          <div style="font-size:100px;margin-bottom:20px;">${news.emoji || '📰'}</div>
          <div class="grad" style="font-size:52px;">${news.title.substring(0, 60)}</div>
          <div class="cta-btn" style="margin-top:50px;">اكتشف التفاصيل →</div>
          <div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:14px;color:#666;font-weight:700;">
            #التقنية #الأخبار #AI
          </div>
        </div>
      `
    },
    {
      content: `
        <div class="progress">
          <span class="p-done"></span>
          <span class="p-active"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
        </div>
        <div class="slide-num">2/6</div>
        <div class="content">
          <div style="font-size:120px;margin-bottom:30px;">💡</div>
          <div style="color:#EC4899;font-size:48px;font-weight:900;margin-bottom:20px;">ليش مهم؟</div>
          <div style="background:linear-gradient(135deg,#8B5CF633,#EC489333);border:2px solid #8B5CF6;border-radius:20px;padding:30px;margin:20px 0;color:#fff;">
            <div style="font-size:32px;line-height:1.8;">
              ${news.description.substring(0, 150)}<br><br>
              <span style="color:#EC4899;font-weight:900;">هذا يغيّر طريقة عملنا</span> 🚀
            </div>
          </div>
        </div>
      `
    },
    {
      content: `
        <div class="progress">
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-active"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
        </div>
        <div class="slide-num">3/6</div>
        <div class="content" style="padding:80px 60px;">
          <div class="grad" style="font-size:48px;margin-bottom:40px;">أبرز النقاط 🎯</div>
          <div style="display:flex;align-items:center;gap:30px;width:100%;margin-bottom:36px;justify-content:flex-end;">
            <div style="text-align:right;flex:1;font-size:40px;font-weight:700;color:#fff;line-height:1.5;">تطور سريع جداً</div>
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:900;flex-shrink:0;">1</div>
          </div>
          <div style="display:flex;align-items:center;gap:30px;width:100%;margin-bottom:36px;justify-content:flex-end;">
            <div style="text-align:right;flex:1;font-size:40px;font-weight:700;color:#fff;line-height:1.5;">تأثير كبير على السوق</div>
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:900;flex-shrink:0;">2</div>
          </div>
          <div style="display:flex;align-items:center;gap:30px;width:100%;margin-bottom:36px;justify-content:flex-end;">
            <div style="text-align:right;flex:1;font-size:40px;font-weight:700;color:#fff;line-height:1.5;">فرص استثمارية</div>
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:900;flex-shrink:0;">3</div>
          </div>
          <div style="display:flex;align-items:center;gap:30px;width:100%;justify-content:flex-end;">
            <div style="text-align:right;flex:1;font-size:40px;font-weight:700;color:#fff;line-height:1.5;">يشكّل المستقبل</div>
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:900;flex-shrink:0;">4</div>
          </div>
        </div>
      `
    },
    {
      content: `
        <div class="progress">
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-active"></span>
          <span class="p-next"></span>
          <span class="p-next"></span>
        </div>
        <div class="slide-num">4/6</div>
        <div class="content" style="padding:80px 60px;">
          <div class="grad" style="font-size:48px;margin-bottom:40px;">الفائدة لك 💎</div>
          <div style="text-align:right;display:flex;align-items:center;gap:30px;margin-bottom:36px;">
            <div style="font-size:40px;font-weight:700;color:#fff;flex:1;">خيارات تقنية جديدة</div>
            <div style="font-size:70px;">✨</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:30px;margin-bottom:36px;">
            <div style="font-size:40px;font-weight:700;color:#fff;flex:1;">أداء أفضل وأسرع</div>
            <div style="font-size:70px;">🚀</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:30px;margin-bottom:36px;">
            <div style="font-size:40px;font-weight:700;color:#fff;flex:1;">فرص اقتصادية</div>
            <div style="font-size:70px;">💰</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:30px;">
            <div style="font-size:40px;font-weight:700;color:#fff;flex:1;">تحسين الإنتاجية</div>
            <div style="font-size:70px;">🎯</div>
          </div>
        </div>
      `
    },
    {
      content: `
        <div class="progress">
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-active"></span>
          <span class="p-next"></span>
        </div>
        <div class="slide-num">5/6</div>
        <div class="content">
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="font-size:100px;margin-bottom:30px;">⚡</div>
            <div class="main-text" style="font-size:56px;margin-bottom:20px;">كن في المقدمة</div>
            <div style="height:3px;background:linear-gradient(90deg,#8B5CF6,#EC4899);width:200px;margin:30px auto;"></div>
            <div class="sub-text" style="font-size:36px;margin:30px 0;">
              المستقبل لا ينتظر<br>
              <span style="color:#EC4899;">تابع معنا الآن</span>
            </div>
            <div style="background:linear-gradient(135deg,#8B5CF633,#EC489333);border:2px solid #8B5CF6;border-radius:20px;padding:20px;margin-top:30px;text-align:center;">
              <div style="font-size:20px;color:#8B5CF6;font-weight:700;">أحدث الأخبار التقنية يومياً 📱</div>
            </div>
          </div>
        </div>
      `
    },
    {
      content: `
        <div class="progress">
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-done"></span>
          <span class="p-active"></span>
        </div>
        <div class="slide-num">6/6</div>
        <div class="content">
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="font-size:90px;margin-bottom:30px;">🎯</div>
            <div style="color:#EC4899;font-size:44px;font-weight:900;">شنو رأيك؟</div>
            <div style="height:3px;background:linear-gradient(90deg,#8B5CF6,#EC4899);width:200px;margin:30px auto;"></div>
            <div style="background:linear-gradient(135deg,#8B5CF666,#EC489666);border-radius:20px;padding:40px;margin:40px 0;">
              <div style="font-size:24px;color:#fff;margin-bottom:20px;font-weight:900;line-height:1.6;">
                ⬇️ اختار:<br>
                🔥 Hot | ✨ New<br>
                💯 Must Follow | 🚀 Game Changer
              </div>
            </div>
          </div>
          <div style="position:absolute;bottom:0;left:0;right:0;padding:30px;background:linear-gradient(180deg,transparent,rgba(139,92,246,0.1));border-top:2px solid rgba(139,92,246,0.3);text-align:center;">
            <div style="font-size:20px;color:#EC4899;font-weight:900;margin-bottom:8px;direction:ltr;">@faisalbuafra</div>
            <div style="font-size:14px;color:#8B5CF6;font-weight:700;line-height:1.6;">#التقنية #الأخبار #AI<br>#TechNews #Innovation</div>
          </div>
        </div>
      `
    }
  ];
  
  slides.forEach((slide, index) => {
    const slideDiv = document.createElement('div');
   slideDiv.className = 'slide slide-preview' + (index === 0 ? ' active' : '');
    slideDiv.id = 'slide-' + (index + 1);
    slideDiv.innerHTML = slide.content;
    wrapper.appendChild(slideDiv);
  });
  
  totalSlides = slides.length;
}

function goSlide(direction) {
  document.getElementById('slide-' + currentSlide).classList.remove('active');
  currentSlide = Math.max(1, Math.min(totalSlides, currentSlide + direction));
  updateSlide();
}

function updateSlide() {
  document.getElementById('slide-' + currentSlide).classList.add('active');
  document.getElementById('slideInfo').textContent = currentSlide + ' / ' + totalSlides;
}

function closeCarousel() {
  document.getElementById('carouselModal').classList.remove('show');
}

function downloadCurrent() {
  var el = document.getElementById('slide-' + currentSlide);
  htmlToImage.toPng(el, {width:1080, height:1350, pixelRatio:2}).then(function(url){
    var a = document.createElement('a');
    a.download = 'carousel_slide_' + currentSlide + '.png';
    a.href = url;
    a.click();
  });
}

async function downloadAll() {
  for(var i=1; i<=totalSlides; i++){
    var el = document.getElementById('slide-' + i);
    await new Promise(r=>setTimeout(r,300));
    var url = await htmlToImage.toPng(el, {width:1080, height:1350, pixelRatio:2});
    var a = document.createElement('a');
    a.download = 'carousel_slide_' + i + '.png';
    a.href = url;
    a.click();
    await new Promise(r=>setTimeout(r,500));
  }
}

document.getElementById('carouselModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeCarousel();
  }
});

// تحميل الأخبار عند فتح الصفحة
window.addEventListener('load', loadNews);

// تحديث الأخبار كل 30 ثانية
setInterval(loadNews, 30000);
</script>
</body>
</html>
